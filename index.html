<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 문제은행 STEP 1 — AI 출제 도우미 (중학 역사)</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{--ink:#33373F;--ink-2:#6B7280;--ink-3:#9CA3AF;--ink-4:#B6BBC3;--line:#EAECEF;--line-2:#F0F1F4;--navy:#2E2E84;--lav:#ABAACB;--lav-bg:#ECECF4;--blue:#3B5BFE;--blue-soft:#EEF1FF;--bg:#FFFFFF;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;font-size:14px}
  .wrap{max-width:1340px;margin:0 auto;padding:0 30px 120px}
  .topnav{display:flex;align-items:center;gap:26px;padding:22px 0 18px;border-bottom:1px solid var(--line-2)}
  .topnav .t1{font-size:17px;font-weight:800;color:#1F2430}
  .topnav .t2{font-size:15px;color:var(--ink-3);font-weight:600}
  .guide{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 17px;font-size:13.5px;color:var(--ink-2);font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer}
  .guide .i{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--ink-3);color:var(--ink-3);display:grid;place-items:center;font-size:10px;font-weight:800}
  .stepper{display:flex;align-items:center;background:var(--lav-bg);border-radius:40px;padding:10px 14px;max-width:770px;margin:30px auto 36px;gap:8px}
  .seg{display:flex;align-items:center;gap:11px;padding:8px 10px;flex:1}
  .seg.on{background:#fff;border-radius:999px;padding:8px 18px;box-shadow:0 1px 4px rgba(40,40,90,.12);flex:0 0 auto}
  .bub{height:30px;padding:0 14px;border-radius:999px;display:grid;place-items:center;font-size:12.5px;font-weight:800;background:var(--lav);color:#fff;white-space:nowrap}
  .seg.on .bub{background:var(--navy)}
  .lb{font-size:15px;font-weight:700;color:var(--ink-3);white-space:nowrap}
  .seg.on .lb{color:#2C313A}
  .tabs{display:flex;gap:30px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .tab{font-size:18px;font-weight:800;color:var(--ink-3);padding:0 2px 14px;border-bottom:3px solid transparent;cursor:pointer;margin-bottom:-1px}
  .tab.on{color:#1F2430;border-color:var(--navy)}
  .subjects{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:30px}
  .subj{border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 22px;font-size:15px;font-weight:700;color:var(--ink-2);cursor:pointer;font-family:inherit}
  .subj.on{background:#17171A;color:#fff;border-color:#17171A}
  .books{display:flex;gap:30px;flex-wrap:wrap}
  .book{width:232px;cursor:pointer}
  .cover{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:3/4;background:#dfe6ef;box-shadow:0 2px 10px rgba(20,30,50,.12)}
  .book .cover::after{content:"";position:absolute;top:6px;right:-5px;bottom:6px;width:6px;background:linear-gradient(#fff,#e7e9ee);border-radius:2px;box-shadow:1px 0 3px rgba(0,0,0,.08);z-index:-1}
  .book.sel .cover{outline:3px solid var(--blue);box-shadow:0 0 0 5px var(--blue-soft),0 4px 14px rgba(59,91,254,.2)}
  .blabel{margin-top:14px;font-size:16px;font-weight:800;color:#1F2430}
  .cover svg{width:100%;height:100%;display:block}.cover .cov{width:100%;height:100%;object-fit:cover;display:block}
  .assistant{position:fixed;right:30px;bottom:26px;z-index:80;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .greet{background:#fff;border:1px solid var(--line);border-radius:18px 18px 4px 18px;box-shadow:0 8px 28px rgba(30,35,60,.16);padding:14px 16px;max-width:240px;font-size:14px;font-weight:600;color:#2C313A;position:relative;animation:floatup .5s ease both}
  .greet b{color:#4D9E3A}
  .greet .close{position:absolute;top:8px;right:10px;color:var(--ink-4);cursor:pointer;font-size:13px}
  .greet .cta{margin-top:9px;font-size:12.5px;font-weight:800;color:var(--blue)}
  .assistant.open .greet{display:none}
  @keyframes floatup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .mascot{background:transparent;border:none;padding:0;position:relative;cursor:pointer;width:118px;animation:bob 3.4s ease-in-out infinite;align-self:flex-end;margin-right:4px}
  .mascot img{width:118px;display:block;filter:drop-shadow(0 7px 12px rgba(20,30,50,.22))}
  .mascot::before{content:"";position:absolute;left:52%;top:46%;transform:translate(-50%,-50%);width:104px;height:104px;border-radius:50%;background:radial-gradient(rgba(124,194,66,.40),transparent 68%);z-index:-1;animation:glow 2.6s ease-in-out infinite}
  @keyframes glow{0%,100%{opacity:.45;transform:translate(-50%,-50%) scale(.88)}50%{opacity:.85;transform:translate(-50%,-50%) scale(1.12)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .assistant.open .mascot{display:none}
  .chat{display:none;flex-direction:column;width:344px;height:484px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 50px rgba(25,30,55,.25);overflow:hidden;animation:floatup .25s ease both}
  .assistant.open .chat{display:flex}
  .chat .chead{background:linear-gradient(135deg,#6FB94F,#4D9E3A);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .chat .chead .av{width:44px;height:44px;border-radius:50%;background:#fff;overflow:hidden;flex:0 0 auto;border:2px solid rgba(255,255,255,.6)}
  .chat .chead .av img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
  .chat .chead .nm{font-size:15px;font-weight:800;line-height:1.25}
  .chat .chead .st{font-size:11.5px;opacity:.9;font-weight:600;display:flex;align-items:center;gap:5px}
  .chat .chead .st .on{width:7px;height:7px;border-radius:50%;background:#EAFBD0;display:inline-block}
  .chat .chead .x{margin-left:auto;cursor:pointer;font-size:18px;opacity:.9}
  .cbody{flex:1;overflow:auto;padding:18px 16px;background:#F7F8FB;display:flex;flex-direction:column;gap:11px}
  .row-ai{display:flex;gap:8px;align-items:flex-end;align-self:flex-start;max-width:88%}
  .row-ai .mini{width:30px;height:30px;border-radius:50%;background:#fff;border:1px solid var(--line);overflow:hidden;flex:0 0 auto}
  .row-ai .mini img{width:100%;height:100%;object-fit:cover;object-position:center 28%}
  .msg{font-size:13.5px;line-height:1.55;padding:11px 14px;border-radius:14px}
  .msg.ai{background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px;color:#2C313A;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .msg.me{background:var(--blue);color:#fff;border-bottom-right-radius:5px;align-self:flex-end;max-width:80%}
  .msg.ai b{color:#4D9E3A}
  .qchips{display:flex;flex-wrap:wrap;gap:7px;align-self:flex-start;max-width:92%;margin-left:38px}
  .qchip{border:1px solid #BFE3A8;background:#fff;color:#3F8C2C;border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .qchip:hover{background:#F1FAEA}
  .resultcard{align-self:flex-start;max-width:92%;margin-left:38px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .resultcard .rt{font-size:13px;font-weight:800;margin-bottom:8px}
  .resultcard .dist{display:flex;gap:6px;margin-bottom:10px}
  .dpill{font-size:11px;font-weight:800;color:#fff;border-radius:6px;padding:3px 8px}
  .du{background:#F0629B}.dm{background:#F5921E}.dl{background:#2BB6D1}
  .resultcard .acts{display:flex;gap:7px}
  .resultcard .acts button{flex:1;border:none;border-radius:9px;padding:10px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit}
  .b-go{background:var(--blue);color:#fff}.b-add{background:var(--blue-soft);color:var(--blue)}
  .cfoot{border-top:1px solid var(--line);padding:11px 12px;display:flex;gap:8px;align-items:center;background:#fff}
  .cfoot input{flex:1;border:1px solid var(--line);border-radius:999px;padding:11px 15px;font-size:13.5px;font-family:inherit;outline:none}
  .cfoot input:focus{border-color:#6FB94F}
  .cfoot .send{width:40px;height:40px;border-radius:50%;border:none;background:#4D9E3A;color:#fff;cursor:pointer;font-size:16px;flex:0 0 auto}

  .chat .chead .cam{margin-left:auto;cursor:pointer;font-size:15px;opacity:.92}
  .chat .chead .x{margin-left:12px}
  .mascot .edit-badge{position:absolute;right:-2px;bottom:10px;width:30px;height:30px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.2);display:grid;place-items:center;font-size:14px;cursor:pointer;z-index:6}
  .mascot.custom img{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 6px 16px rgba(20,30,50,.3);display:block;margin:0 auto}
  .assistant.open .mascot .edit-badge{display:none}
  .cust-overlay{position:fixed;inset:0;background:rgba(18,22,38,.5);z-index:90;display:none;align-items:center;justify-content:center}
  .cust-overlay.show{display:flex}
  .cust{background:#fff;border-radius:20px;width:332px;padding:24px;box-shadow:0 24px 60px rgba(20,25,50,.35);text-align:center;animation:floatup .25s ease both}
  .cust h3{font-size:16px;font-weight:800;color:#22262E}
  .cust .sub{font-size:12.5px;color:var(--ink-3);margin-top:5px}
  .cust .preview{width:116px;height:116px;border-radius:50%;margin:16px auto;overflow:hidden;border:3px solid #EAF3E2;background:#F7F8FB;display:grid;place-items:center}
  .cust .preview img{width:100%;height:100%;object-fit:cover}
  .cust .presets{display:flex;gap:10px;justify-content:center;margin:4px 0 16px;flex-wrap:wrap}
  .cust .preset{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid var(--line);cursor:pointer;background:#fff;padding:0}
  .cust .preset img{width:100%;height:100%;object-fit:cover;object-position:center 30%;background:#F2F5F8}
  .cust .preset.on{border-color:#4D9E3A;box-shadow:0 0 0 2px #DDF1D0}
  .cust .upload{width:100%;border:none;border-radius:12px;background:#4D9E3A;color:#fff;font-size:14.5px;font-weight:800;padding:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
  .cust .done{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink-2);font-size:14px;font-weight:700;padding:12px;cursor:pointer;font-family:inherit;margin-top:8px}
  .cust .tip{font-size:11px;color:var(--ink-4);margin-top:11px;line-height:1.5}
  .cust .namefield{text-align:left;margin:16px 0 2px}
  .cust .namefield label{font-size:12px;font-weight:800;color:var(--ink-3)}
  .cust .namefield input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;margin-top:7px;outline:none}
  .cust .namefield input:focus{border-color:#4D9E3A}
</style>
</head>

  const A=document.getElementById('assistant'), cbody=document.getElementById('cbody'), inp=document.getElementById('cinput');
  let started=false;
  function hideGreet(){document.getElementById('greet').style.display='none';}
  function openChat(){A.classList.add('open');if(!started){bootstrap();started=true;}inp.focus();}
  function closeChat(){A.classList.remove('open');}
  function addAI(html){const r=document.createElement('div');r.className='row-ai';r.innerHTML='<div class="mini"><img src="'+MASCOT+'"></div><div class="msg ai">'+html+'</div>';cbody.appendChild(r);cbody.scrollTop=cbody.scrollHeight;}
  function addMe(t){const d=document.createElement('div');d.className='msg me';d.textContent=t;cbody.appendChild(d);cbody.scrollTop=cbody.scrollHeight;}
  function addRaw(html){const w=document.createElement('div');w.innerHTML=html;cbody.appendChild(w.firstElementChild);cbody.scrollTop=cbody.scrollHeight;}
  function bootstrap(){
    addAI('안녕하세요, 선생님! 😊<br><b>역사①</b> 출제 도우미예요.<br>아래처럼 <b>명확하게 명령</b>해 주시면 바로 출제해 드려요.<br>예) <b>"이 단원의 문제를 출제해줘"</b>');
    const chips=document.createElement('div');chips.className='qchips';
    ['이 단원의 문제를 출제해줘','3단원 객관식 10문항 출제해줘','3단원 형성평가로 출제해줘','3단원 서술형 위주로 출제해줘'].forEach(t=>{const b=document.createElement('button');b.className='qchip';b.textContent=t;b.onclick=()=>handle(t);chips.appendChild(b);});
    cbody.appendChild(chips);cbody.scrollTop=cbody.scrollHeight;
  }
  function sendMsg(){const v=inp.value.trim();if(!v)return;inp.value='';handle(v);}
  function handle(text){
    document.querySelectorAll('.qchips').forEach(e=>e.remove());
    addMe(text);
    const unitM=text.match(/(\d+)\s*단원/); const unit=unitM?unitM[1]+'단원':'3단원';
    const cntM=text.match(/(\d+)\s*문항/); const cnt=cntM?parseInt(cntM[1]):10;
    let type='형성평가'; if(text.includes('서술형'))type='서술형'; else if(text.includes('객관식'))type='객관식';
    const hi=Math.max(1,Math.round(cnt*0.2)); const mid=Math.round(cnt*0.5); const lo=Math.max(0,cnt-hi-mid);
    setTimeout(()=>{addAI('네, 선생님. <b>역사① · '+unit+'</b> 기준으로 '+type+' '+cnt+'문항을 출제했어요.');

  function buildPresets(){
    const row=document.getElementById('presetRow'); row.innerHTML='';
    PRESETS.forEach((p,i)=>{const b=document.createElement('button');b.className='preset'+(i===0?' on':'');b.title=p.label;
      b.innerHTML='<img src="'+p.src+'">';b.onclick=()=>{setMascot(p.src,p.custom);markPreset(b);};row.appendChild(b);});
  }
  function markPreset(el){document.querySelectorAll('.preset').forEach(x=>x.classList.remove('on'));if(el)el.classList.add('on');}
  function setMascot(src,isCustom){
    MASCOT=src;
    document.getElementById('mascotImg').src=src;
    document.getElementById('avatarImg').src=src;
    document.getElementById('custPreview').src=src;
    document.querySelectorAll('.row-ai .mini img').forEach(i=>i.src=src);
    document.getElementById('mascotBtn').classList.toggle('custom', !!isCustom);
  }
  function openCust(){document.getElementById('custOverlay').classList.add('show');}
  function closeCust(){document.getElementById('custOverlay').classList.remove('show');}
  document.getElementById('fileInput').addEventListener('change',function(e){
    const f=e.target.files[0]; if(!f)return;
    if(!f.type.startsWith('image/')){return;}
    const r=new FileReader();
    r.onload=ev=>{ setMascot(ev.target.result, true); markPreset(null); };
    r.readAsDataURL(f);
  });
  const nameInput=document.getElementById('nameInput'), asstName=document.getElementById('asstName');
  nameInput.addEventListener('input',()=>{asstName.textContent = nameInput.value.trim() || 'AI 출제 도우미';});
  buildPresets();
</script>
